<div class="min-h-screen flex items-center justify-center bg-gray-100">
  <div class="bg-white p-8 rounded-lg shadow-md w-96">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Login</h2>
    
    <div *ngIf="errorMessage" class="bg-red-500 text-white p-2 rounded mb-4 text-center font-bold">
      {{ errorMessage }}
    </div>

    <form (ngSubmit)="onLogin()">
      <div class="mb-4">
        <label class="block text-sm font-semibold mb-1">E-mail</label>
        <input type="email" [(ngModel)]="credentials.email" name="email" class="w-full p-2 border rounded" required>
      </div>
      <div class="mb-6">
        <label class="block text-sm font-semibold mb-1">Senha</label>
        <input type="password" [(ngModel)]="credentials.password" name="password" class="w-full p-2 border rounded" required>
      </div>
      <button type="submit" class="w-full bg-blue-500 text-white p-2 rounded hover:bg-blue-600 transition">Entrar</button>
    </form>
    <p class="mt-4 text-sm text-center">Não tem conta? <a routerLink="/register" class="text-blue-500 hover:underline">Crie uma</a></p>
  </div>
</div>
